  window.storage = {
    async get(key){
      try {
        const snap = await getDoc(doc(db, "steam", key));

      } catch(e){ console.error("storage.get", e); return null; }
    },
    async set(key, value){
      try {
        await setDoc(doc(db, "steam", key), { value });

      } catch(e){ console.error("storage.set", e); return null; }
    },
  };

function useDecibel() {
  const [db, setDb] = useState(0);
  const [active, setActive] = useState(false);
  const ref = useRef({});
  const start = async () => {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({audio:true});
      const ctx = new (window.AudioContext||window.webkitAudioContext)();
      const src = ctx.createMediaStreamSource(stream);
      const an = ctx.createAnalyser(); an.fftSize=256; src.connect(an);
      ref.current={stream,ctx,an}; setActive(true);
      const buf=new Uint8Array(an.frequencyBinCount);
      const tick=()=>{ an.getByteFrequencyData(buf);
        setDb(Math.round(buf.reduce((a,b)=>a+b,0)/buf.length));
        ref.current.raf=requestAnimationFrame(tick); };
      tick();
    } catch { alert("마이크 권한이 필요합니다."); }
  };
  const stop = () => { cancelAnimationFrame(ref.current.raf);
    ref.current.stream?.getTracks().forEach(t=>t.stop());
    ref.current.ctx?.close(); setActive(false); setDb(0); };
  return { db, active, start, stop };
}

      const src = ctx.createMediaStreamSource(stream);
      const an = ctx.createAnalyser(); an.fftSize=2048; src.connect(an);
      ref.current={stream,ctx,an}; setActive(true);
      const buf=new Float32Array(an.fftSize);
      const tick=()=>{ an.getFloatTimeDomainData(buf);

        ref.current.raf=requestAnimationFrame(tick); };

    } catch { alert("마이크 권한이 필요합니다."); }
  };
  const stop = () => { cancelAnimationFrame(ref.current.raf);
    ref.current.stream?.getTracks().forEach(t=>t.stop());
    ref.current.ctx?.close(); setActive(false); };
  return { note, active, start, stop };
}
function autoCorrelate(buf, sr) {
  let rms=0; for(let i=0;i<buf.length;i++) rms+=buf[i]*buf[i];
  rms=Math.sqrt(rms/buf.length); if(rms<0.01) return -1;
  let r1=0,r2=buf.length-1;
  for(let i=0;i<buf.length/2;i++){if(Math.abs(buf[i])<0.2){r1=i;break;}}
  for(let i=1;i<buf.length/2;i++){if(Math.abs(buf[buf.length-i])<0.2){r2=buf.length-i;break;}}
  const t=buf.slice(r1,r2); const c=new Array(t.length).fill(0);
  for(let i=0;i<t.length;i++) for(let j=0;j<t.length-i;j++) c[i]+=t[j]*t[j+i];
  let d=0; while(c[d]>c[d+1]) d++;
  let mv=-1,mp=-1; for(let i=d;i<t.length;i++){if(c[i]>mv){mv=c[i];mp=i;}}
  return sr/mp;
}
function freqToNote(freq) {
  let closest=null,min=Infinity;
  for(const [n,f] of Object.entries(NOTE_FREQS)){
    let cf=freq; while(cf>f*1.5) cf/=2; while(cf<f*0.67) cf*=2;
    const d=Math.abs(cf-f); if(d<min){min=d;closest=n;}
  }
  return min<25?closest:null;
}
// 옥타브 구분이 필요한 화음용 — 실제 주파수로 매칭 (도/높은도 구별)
function freqToChordNote(freq) {
  let closest=null,min=Infinity;
  for(const [n,f] of Object.entries(CHORD_FREQS)){
    const d=Math.abs(freq-f); if(d<min){min=d;closest=n;}
  }
  // 허용 오차: 해당 음 주파수의 약 6%
  return (closest && min < CHORD_FREQS[closest]*0.06) ? closest : null;
}
// 원시 주파수 반환 훅 (옥타브 안 접음)
function useRawPitch() {
  const [freq, setFreq] = useState(0);
  const [active, setActive] = useState(false);
  const ref = useRef({});
  const start = async () => {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({audio:true});
      const ctx = new (window.AudioContext||window.webkitAudioContext)();
      const src = ctx.createMediaStreamSource(stream);
      const an = ctx.createAnalyser(); an.fftSize=2048; src.connect(an);
      ref.current={stream,ctx,an}; setActive(true);
      const buf=new Float32Array(an.fftSize);
      const tick=()=>{ an.getFloatTimeDomainData(buf);
        const f=autoCorrelate(buf,ctx.sampleRate);
        if(f>0) setFreq(Math.round(f));
        ref.current.raf=requestAnimationFrame(tick); };
      tick();
    } catch { alert("마이크 권한이 필요합니다."); }
  };
  const stop = () => { cancelAnimationFrame(ref.current.raf);
    ref.current.stream?.getTracks().forEach(t=>t.stop());
    ref.current.ctx?.close(); setActive(false); setFreq(0); };
  return { freq, active, start, stop };
}
function useShake() {
  const [count, setCount] = useState(0);
  const [active, setActive] = useState(false);
  const last = useRef(0);
  const handlerRef = useRef(null);
  const start = () => {
    setCount(0); setActive(true);
    const h=(e)=>{ const a=e.accelerationIncludingGravity; if(!a) return;
      const tot=Math.abs(a.x||0)+Math.abs(a.y||0)+Math.abs(a.z||0);
      if(tot>25 && Date.now()-last.current>280){ last.current=Date.now(); setCount(c=>c+1); } };
    handlerRef.current=h; window.addEventListener("devicemotion",h);
  };
  const stop = () => { window.removeEventListener("devicemotion",handlerRef.current); setActive(false); };
  return { count, active, start, stop };
}
function captureColor(video, canvas) {
  canvas.width=video.videoWidth||320; canvas.height=video.videoHeight||240;
  const ctx=canvas.getContext("2d"); ctx.drawImage(video,0,0);
  const cw=canvas.width, ch=canvas.height;
  const data=ctx.getImageData(cw*0.3,ch*0.3,cw*0.4,ch*0.4).data;
  let r=0,g=0,b=0,n=0;
  for(let i=0;i<data.length;i+=4){r+=data[i];g+=data[i+1];b+=data[i+2];n++;}
  return { r:Math.round(r/n), g:Math.round(g/n), b:Math.round(b/n) };
}

function ColorCameraMission({ target, onClear, accent }) {

function PitchMission({ target, onClear }) {

  const [score, setScore] = useState(0);
  const playNote = () => {
    const ctx = new (window.AudioContext||window.webkitAudioContext)();
    const osc = ctx.createOscillator(), gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.frequency.value = NOTE_FREQS[target]; osc.type="sine";
    gain.gain.setValueAtTime(0.5,ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+1.5);

// 2.5 4인 화음 (도-미-솔-높은도, 절대음감 순차 입력)
function ChordMission({ onClear }) {
  const STEPS = [
    { key:"낮은도", label:"낮은 도", freq:261.6, who:"1번 주자" },
    { key:"미",     label:"미",      freq:329.6, who:"2번 주자" },
    { key:"솔",     label:"솔",      freq:392.0, who:"3번 주자" },
    { key:"높은도", label:"높은 도", freq:523.3, who:"4번 주자" },
  ];
  const { freq, active, start, stop } = useRawPitch();
  const [stepIdx, setStepIdx] = useState(0);
  const [holdMs, setHoldMs] = useState(0);
  const [attempts, setAttempts] = useState(0);
  const [done, setDone] = useState(false);
  const stopRef = useRef(stop); stopRef.current = stop;
  useEffect(()=>()=>stopRef.current(),[]);

  const cur = STEPS[stepIdx];
  const matched = cur && freqToChordNote(freq)===cur.key;

  // 현재 음을 0.6초 이상 정확히 유지하면 통과
  useEffect(()=>{
    if(!active || done) return;
    let raf, last=performance.now();
    const loop=()=>{
      const now=performance.now(), dt=now-last; last=now;
      if(freqToChordNote(freq)===cur.key){
        setHoldMs(h=>{
          const nh=h+dt;
          if(nh>=600){
            // 이 음 통과
            if(stepIdx+1>=STEPS.length){ setDone(true); stop();
              const sc=attemptScore(attempts+1); onClear(sc);
            } else { setStepIdx(stepIdx+1); }
            return 0;
          }
          return nh;
        });
      } else setHoldMs(0);
      raf=requestAnimationFrame(loop);
    };
    raf=requestAnimationFrame(loop);
    return ()=>cancelAnimationFrame(raf);
  },[active,freq,stepIdx,done]);

  const retry = ()=>{ setAttempts(a=>a+1); setStepIdx(0); setHoldMs(0); setDone(false); };

  return (
    <Panel>
      <PanelHeader color={C.purple}>🎶 미션 — 4인 화음 (도·미·솔·높은도)</PanelHeader>
      <div style={{padding:16,display:"flex",flexDirection:"column",gap:12}}>
        <div style={{fontSize:12,color:C.text,lineHeight:1.8}}>
          한 팀이 <span style={{color:C.purple,fontWeight:700}}>도 메이저 화음</span>을 완성한다.<br/>
          4명이 순서대로 자기 음을 <b>0.6초간 정확히</b> 내면 다음 주자로 넘어간다.<br/>
          한 명이라도 음정이 틀리면 그 음에서 멈춘다.
        </div>

        {/* 4단계 진행 표시 */}
        <div style={{display:"flex",gap:6}}>
          {STEPS.map((s,i)=>(
            <div key={s.key} style={{flex:1,textAlign:"center",padding:"8px 4px",
              border:`1px solid ${i<stepIdx||done?C.green:i===stepIdx?C.purple:C.border}`,
              background:i<stepIdx||done?C.dimGreen+"44":i===stepIdx?C.purple+"22":C.bg,
              color:i<stepIdx||done?C.green:i===stepIdx?C.purple:C.dim}}>
              <div style={{fontSize:11,fontWeight:700}}>{s.label}</div>
              <div style={{fontSize:8,marginTop:2}}>{s.who}</div>
              <div style={{fontSize:8,opacity:0.7}}>{Math.round(s.freq)}Hz</div>
              <div style={{fontSize:10,marginTop:2}}>{i<stepIdx||done?"✅":i===stepIdx?"🎤":"…"}</div>
            </div>
          ))}
        </div>

        {!done && <>
          <div style={{textAlign:"center",padding:"10px 0",border:`1px solid ${matched?C.green:C.border}`,background:matched?C.dimGreen+"22":C.bg}}>
            <div style={{color:C.dim,fontSize:11}}>{cur.who} 차례 — <span style={{color:C.purple,fontWeight:700}}>{cur.label}</span> ({Math.round(cur.freq)}Hz)</div>
            <div style={{color:matched?C.green:C.yellow,fontSize:32,fontWeight:900,marginTop:4}}>{active?(freq||"--"):"--"}<span style={{fontSize:14}}>Hz</span></div>
            {/* 유지 게이지 */}
            <div style={{height:8,background:C.border,margin:"8px 16px 0"}}>
              <div style={{height:"100%",background:C.green,width:`${Math.min(holdMs/600*100,100)}%`,transition:"width 0.05s"}} />
            </div>
            <div style={{color:C.dim,fontSize:9,marginTop:4}}>{matched?"유지 중! 계속...":"정확한 음을 내라"}</div>
          </div>
          <Btn full color={C.purple} onClick={active?stop:start}>{active?"⏹ 중지":"🎙 화음 측정 시작"}</Btn>
        </>}

        {done && (
          <div style={{padding:16,textAlign:"center",border:`1px solid ${C.green}`,background:C.dimGreen+"22"}}>
            <div style={{fontSize:30}}>🎼</div>
            <div style={{color:C.green,fontWeight:900,marginTop:6}}>화음 완성! 미션 통과!</div>
            <div style={{color:C.dim,fontSize:11,marginTop:4}}>4명이 도 메이저 코드를 완성했다</div>
          </div>
        )}
        {!done && stepIdx>0 && <Btn sm color={C.dim} full onClick={retry}>↩ 처음부터 다시 (성공 시 {attemptScore(attempts+1)}점)</Btn>}
      </div>
    </Panel>
  );
}

    // 박자 메트로놈
    const beatTick = () => {
      setBeatOn(true); setTimeout(()=>setBeatOn(false), 120);
      playClick(ctx);
      motionData.current.beatTimes.push(performance.now());
    };
    beatTick();
    refs.current.beatTimer = setInterval(beatTick, beatInterval);

    // 가속도 감지 (흔들기 피크)
    const onMotion = (e) => {
      const a = e.accelerationIncludingGravity; if(!a) return;
      const mag = Math.abs(a.x||0) + Math.abs(a.y||0) + Math.abs(a.z||0);
      const now = performance.now();
      if(mag > 22 && now - motionData.current.lastPeak > 200){
        motionData.current.lastPeak = now;
        motionData.current.hits.push(now);
      }
    };
    refs.current.onMotion = onMotion;
    window.addEventListener("devicemotion", onMotion);

    // 30초 카운트다운
    refs.current.countdown = setInterval(()=>{
      setTimeLeft(t=>{
        if(t<=1){ finishDance(); return 0; }
        return t-1;
      });
    }, 1000);
  };

  const finishDance = () => {
    clearInterval(refs.current.beatTimer);
    clearInterval(refs.current.countdown);
    window.removeEventListener("devicemotion", refs.current.onMotion);
    refs.current.ctx?.close();

    // 박자 정확도 계산: 각 흔들기가 가장 가까운 비트와 얼마나 가까운지
    const { hits, beatTimes } = motionData.current;
    if(hits.length === 0 || beatTimes.length === 0){ setAccuracy(0); setPhase("result"); return; }
    let totalErr = 0, matched = 0;
    hits.forEach(h => {
      let minDiff = Infinity;
      beatTimes.forEach(b => { const d=Math.abs(h-b); if(d<minDiff) minDiff=d; });
      if(minDiff < beatInterval/2){ totalErr += minDiff; matched++; }
    });
    // 정확도: 맞춘 비율 × 타이밍 정밀도
    const hitRate = Math.min(matched / beatTimes.length, 1);
    const avgErr = matched>0 ? totalErr/matched : beatInterval;
    const precision = Math.max(0, 1 - avgErr/(beatInterval/2));
    const acc = Math.round(hitRate * 0.6 * 100 + precision * 0.4 * 100);
    setAccuracy(Math.min(acc, 100));
    setPhase("dance-done");
  };

  useEffect(()=>()=>{ // cleanup
    clearInterval(refs.current.beatTimer);
    clearInterval(refs.current.countdown);
    if(refs.current.onMotion) window.removeEventListener("devicemotion", refs.current.onMotion);
    refs.current.ctx?.close();
  },[]);

  // 진동수/주기 정답
  const correctFreq = (bpm/60).toFixed(2); // Hz (회/초)
  const correctPeriod = (60/bpm).toFixed(2); // 초
  const checkQuiz = () => {
    const f = Math.abs(parseFloat(quizAns.freq) - parseFloat(correctFreq)) < 0.1;
    const p = Math.abs(parseFloat(quizAns.period) - parseFloat(correctPeriod)) < 0.1;
    const ok = f && p;
    setQuizResult({ f, p, ok });
    if(ok && accuracy >= 50) onClear(Math.max(accuracy, 50));
  };

  return (
    <Panel>
      <PanelHeader color={C.blue}>🎶 미션 — 박자 댄스 (BPM {bpm})</PanelHeader>
      <div style={{padding:16,display:"flex",flexDirection:"column",gap:12}}>

        {phase==="intro" && <>
          <div style={{fontSize:12,color:C.text,lineHeight:1.8}}>
            폰을 손에 꼭 쥐고, 화면이 깜빡이는 박자에 맞춰<br/>
            30초간 몸을 흔들어라. 박자가 정확할수록 점수가 높다.
          </div>
          <div style={{fontSize:11,color:C.dim}}>※ 정확도 50% 이상 + 진동수 문제까지 풀어야 통과</div>
          <Btn full color={C.blue} onClick={startDance}>🎵 시작 (소리 켜기)</Btn>
        </>}

        {phase==="dance" && <>
          <div style={{textAlign:"center",padding:"10px 0"}}>
            <div style={{
              width:120,height:120,borderRadius:"50%",margin:"0 auto",
              background: beatOn ? C.blue : C.bg,
              border:`4px solid ${C.blue}`, transition:"all 0.1s",
              display:"flex",alignItems:"center",justifyContent:"center",
              boxShadow: beatOn ? `0 0 30px ${C.blue}` : "none",
            }}>
              <span style={{fontSize:40}}>{beatOn?"🔵":"⚪"}</span>
            </div>
            <div style={{color:C.yellow,fontSize:28,fontWeight:900,marginTop:12}}>{timeLeft}초</div>
            <div style={{color:C.dim,fontSize:11,marginTop:4}}>박자에 맞춰 흔들어라!</div>
          </div>
          <Btn full color={C.red} onClick={finishDance}>⏹ 중지</Btn>
        </>}

        {phase==="dance-done" && <>
          <div style={{textAlign:"center",padding:16,border:`1px solid ${accuracy>=50?C.green:C.red}`,background:accuracy>=50?C.dimGreen+"22":C.red+"11"}}>
            <div style={{color:C.dim,fontSize:11}}>박자 정확도</div>
            <div style={{color:accuracy>=50?C.green:C.red,fontSize:44,fontWeight:900}}>{accuracy}%</div>
            <div style={{color:accuracy>=50?C.green:C.red,fontWeight:700,fontSize:13,marginTop:6}}>
              {accuracy>=50?"✅ 박자 합격! 이제 문제를 풀어라":"❌ 박자가 안 맞았다. 재도전!"}
            </div>
          </div>
          {accuracy>=50
            ? <Btn full color={C.blue} onClick={()=>setPhase("quiz")}>📝 진동수 문제 풀기 →</Btn>
            : <Btn full color={C.blue} onClick={()=>setPhase("intro")}>↩ 재도전</Btn>}
        </>}

        {phase==="quiz" && <>
          <div style={{fontSize:12,color:C.text,lineHeight:1.8,background:C.bg,padding:12,border:`1px solid ${C.border}`}}>
            방금 BPM {bpm}의 박자로 움직였다.<br/>
            <span style={{color:C.yellow}}>BPM {bpm} = 1분에 {bpm}번 박자</span><br/><br/>
            ① 진동수(Hz, 1초당 박자 수)는?<br/>
            ② 주기(T, 한 박자에 걸리는 시간, 초)는?
          </div>
          <div style={{fontSize:10,color:C.dim}}>💡 진동수 = BPM÷60 · 주기 = 60÷BPM (소수 둘째자리)</div>
          <div style={{display:"flex",gap:8}}>
            <input placeholder="진동수 Hz" value={quizAns.freq} onChange={e=>setQuizAns({...quizAns,freq:e.target.value})} type="number" step="0.01"
              style={{flex:1,padding:"10px",background:C.bg,border:`1px solid ${C.border}`,color:C.green,fontFamily:"monospace",fontSize:13}} />
            <input placeholder="주기 초" value={quizAns.period} onChange={e=>setQuizAns({...quizAns,period:e.target.value})} type="number" step="0.01"
              style={{flex:1,padding:"10px",background:C.bg,border:`1px solid ${C.border}`,color:C.green,fontFamily:"monospace",fontSize:13}} />
          </div>
          <Btn full color={C.blue} onClick={checkQuiz}>✓ 정답 제출</Btn>
          {quizResult && (
            <div style={{padding:14,border:`1px solid ${quizResult.ok?C.green:C.red}`,background:quizResult.ok?C.dimGreen+"22":C.red+"11"}}>
              <div style={{fontSize:12,color:C.text}}>
                진동수 {quizResult.f?"✅":"❌"} · 주기 {quizResult.p?"✅":"❌"}
              </div>
              <div style={{color:quizResult.ok?C.green:C.red,fontWeight:900,marginTop:6}}>
                {quizResult.ok?"✅ 미션 완전 통과!":"❌ 다시 계산해보라."}
              </div>
              {!quizResult.ok && <div style={{color:C.dim,fontSize:10,marginTop:4}}>정답: 진동수 {correctFreq}Hz · 주기 {correctPeriod}초</div>}
            </div>
          )}
        </>}
      </div>
    </Panel>
  );
}

// 4. 황금비율
function RatioMission({ onClear }) {
  const videoRef = useRef(null), canvasRef = useRef(null);
  const [streaming, setStreaming] = useState(false);
  const [photo, setPhoto] = useState(false);
  const [w, setW] = useState(""), [h, setH] = useState("");
  const [result, setResult] = useState(null);
  const startCam = async () => {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"}});
      videoRef.current.srcObject = stream; await videoRef.current.play(); setStreaming(true);
    } catch { alert("카메라 권한이 필요합니다."); }
  };
  const capture = () => {
    const cv=canvasRef.current, v=videoRef.current;
    cv.width=v.videoWidth; cv.height=v.videoHeight;
    cv.getContext("2d").drawImage(v,0,0);
    v.srcObject?.getTracks().forEach(t=>t.stop()); setStreaming(false); setPhoto(true);
  };
  const check = () => {
    const long=Math.max(+w,+h), short=Math.min(+w,+h);
    if(!short){ setResult({ok:false,ratio:0}); return; }
    const ratio=long/short; const ok=Math.abs(ratio-1.618)<=0.15;
    setResult({ok,ratio:ratio.toFixed(3)}); if(ok) onClear(100);
  };
  return (
    <Panel>
      <PanelHeader color="#E0E0E0">📐 미션 — 황금비율 탐색</PanelHeader>
      <div style={{padding:16,display:"flex",flexDirection:"column",gap:12}}>
        <div style={{fontSize:11,color:C.dim,lineHeight:1.7}}>
          창문·기둥·액자·타일 등 직사각형 구조물을 찾아 촬영하고,<br/>가로·세로 길이(cm)를 재서 입력하라. 비율이 1.618±0.15면 통과.
        </div>
        <video ref={videoRef} playsInline muted style={{width:"100%",border:`1px solid ${C.border}`,display:streaming?"block":"none"}} />
        <canvas ref={canvasRef} style={{display:photo?"block":"none",width:"100%",border:`1px solid ${C.border}`}} />
        {!streaming && !photo && <Btn full color="#E0E0E0" onClick={startCam}>📷 카메라 켜기</Btn>}
        {streaming && <Btn full color={C.yellow} onClick={capture}>📸 촬영</Btn>}
        {photo && <>
          <div style={{display:"flex",gap:8}}>
            <input placeholder="가로 cm" value={w} onChange={e=>setW(e.target.value)} type="number"
              style={{flex:1,padding:"10px",background:C.bg,border:`1px solid ${C.border}`,color:C.green,fontFamily:"monospace",fontSize:13}} />
            <input placeholder="세로 cm" value={h} onChange={e=>setH(e.target.value)} type="number"
              style={{flex:1,padding:"10px",background:C.bg,border:`1px solid ${C.border}`,color:C.green,fontFamily:"monospace",fontSize:13}} />
          </div>
          <Btn full color={C.yellow} onClick={check}>📐 비율 계산</Btn>
        </>}
        {result && (
          <div style={{padding:14,border:`1px solid ${result.ok?C.green:C.red}`,background:result.ok?C.dimGreen+"22":C.red+"11"}}>
            <div style={{color:C.text,fontSize:13}}>측정 비율: <span style={{color:C.yellow,fontWeight:700}}>{result.ratio}</span> (황금비 1.618)</div>
            <div style={{color:result.ok?C.green:C.red,fontWeight:900,marginTop:6}}>
              {result.ok?"✅ 황금비율 발견! 미션 통과!":"❌ 황금비율과 거리가 있다. 다른 구조물을 찾아라."}</div>
          </div>
        )}
      </div>
    </Panel>
  );
}

// 5. 탄소 계산
function CarbonMission({ onClear }) {
  // 생산+운송 탄소 (kg CO2 per 1인분, 근사값). 카테고리: 탄수/단백/채소
  const FOODS = [
    { id:"rice",  name:"쌀밥",       emoji:"🍚", origin:"국산",   cat:"탄수", co2:1.2 },
    { id:"bread", name:"빵",         emoji:"🍞", origin:"수입밀",  cat:"탄수", co2:1.6 },
    { id:"noodle",name:"국수",       emoji:"🍜", origin:"국산",   cat:"탄수", co2:1.4 },
    { id:"beef",  name:"소고기",     emoji:"🥩", origin:"호주산", cat:"단백", co2:27.0 },
    { id:"pork",  name:"돼지고기",   emoji:"🥓", origin:"국산",   cat:"단백", co2:12.1 },
    { id:"chick", name:"닭고기",     emoji:"🍗", origin:"국산",   cat:"단백", co2:6.9 },
    { id:"fish",  name:"고등어",     emoji:"🐟", origin:"국산",   cat:"단백", co2:3.0 },
    { id:"tofu",  name:"두부",       emoji:"🧈", origin:"국산콩", cat:"단백", co2:2.0 },
    { id:"egg",   name:"계란",       emoji:"🥚", origin:"지역산", cat:"단백", co2:4.5 },
    { id:"shrimp",name:"새우",       emoji:"🦐", origin:"베트남", cat:"단백", co2:18.0 },
    { id:"kimchi",name:"김치",       emoji:"🥬", origin:"지역산", cat:"채소", co2:0.5 },
    { id:"salad", name:"샐러드",     emoji:"🥗", origin:"지역산", cat:"채소", co2:0.4 },
    { id:"spinach",name:"시금치나물",emoji:"🌿", origin:"지역산", cat:"채소", co2:0.4 },
    { id:"avocado",name:"아보카도",  emoji:"🥑", origin:"멕시코", cat:"채소", co2:2.5 },
    { id:"banana",name:"바나나",     emoji:"🍌", origin:"필리핀", cat:"채소", co2:0.9 },
    { id:"mango", name:"망고",       emoji:"🥭", origin:"태국",   cat:"채소", co2:1.8 },
  ];
  const [tray, setTray] = useState([]); // food ids
  const [shown, setShown] = useState(false);

  const toggle = (id) => {
    if(shown) return;
    setTray(t => t.includes(id) ? t.filter(x=>x!==id) : [...t, id]);
  };
  const trayFoods = tray.map(id=>FOODS.find(f=>f.id===id));
  const totalCO2 = trayFoods.reduce((s,f)=>s+f.co2,0);
  const cats = new Set(trayFoods.map(f=>f.cat));
  const balanced = cats.has("탄수") && cats.has("단백") && cats.has("채소");
  const km = (totalCO2/0.21).toFixed(0);

  // 점수: 영양 균형 필수, 탄소 낮을수록 고점
  const calcScore = () => {
    if(!balanced) return 40; // 불균형
    if(totalCO2<=5)  return 100;
    if(totalCO2<=10) return 90;
    if(totalCO2<=20) return 75;
    if(totalCO2<=30) return 60;
    return 50;
  };
  const score = calcScore();

  // 가장 탄소 높은 단백질 → 대안 제안
  const proteinInTray = trayFoods.filter(f=>f.cat==="단백").sort((a,b)=>b.co2-a.co2)[0];
  const lowProtein = FOODS.filter(f=>f.cat==="단백").sort((a,b)=>a.co2-b.co2)[0];

  const catColor = { "탄수":C.yellow, "단백":C.orange, "채소":C.green };

  return (
    <Panel>
      <PanelHeader color={C.yellow}>🍽 미션 — 저탄소 식판 구성</PanelHeader>
      <div style={{padding:16,display:"flex",flexDirection:"column",gap:12}}>
        {!shown ? <>
          <div style={{fontSize:12,color:C.text,lineHeight:1.8}}>
            <b>균형 잡힌 한 끼</b>(탄수+단백+채소)를 식판에 담되,<br/>
            <span style={{color:C.green,fontWeight:700}}>탄소 배출은 최소</span>로 만들어라.<br/>
            <span style={{color:C.dim,fontSize:11}}>※ 어떤 음식이 탄소가 높을지 예상하며 담아봐. 거리보다 '무엇을 먹느냐'가 더 중요하다.</span>
          </div>

          {/* 음식 선택 그리드 */}
          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8}}>
            {FOODS.map(f=>{
              const sel = tray.includes(f.id);
              return (
                <button key={f.id} onClick={()=>toggle(f.id)} style={{
                  padding:"10px 4px",border:`2px solid ${sel?catColor[f.cat]:C.border}`,
                  background:sel?catColor[f.cat]+"22":C.bg,color:C.text,
                  fontFamily:"monospace",cursor:"pointer",borderRadius:4}}>
                  <div style={{fontSize:24}}>{f.emoji}</div>
                  <div style={{fontSize:11,marginTop:2}}>{f.name}</div>
                  <div style={{fontSize:8,color:C.dim,marginTop:2}}>{f.origin}</div>
                  <div style={{fontSize:8,color:catColor[f.cat],marginTop:1}}>{f.cat}</div>
                </button>
              );
            })}
          </div>

          {/* 내 식판 — 5칸 급식판 */}
          <div style={{
            border:`3px solid #8a8d91`, borderRadius:16, padding:10,
            background:"linear-gradient(135deg,#cdd1d5,#a8acb0)",
            display:"grid", gridTemplateColumns:"1fr 1fr", gridTemplateRows:"1fr 1fr",
            gap:8, minHeight:180 }}>
            {[0,1,2,3,4].map(si=>{
              // 0,1 = 위 두 칸 / 2 = 가운데 가로로 긴 칸 / 3,4 = 아래 두 칸
              const perSlot = Math.ceil(trayFoods.length/5);
              const items = trayFoods.slice(si*perSlot,(si+1)*perSlot);
              const wide = si===2;
              return (
                <div key={si} style={{
                  gridColumn: wide?"1 / 3":"auto",
                  background:"#eef0f2", borderRadius:10, border:"2px solid #b6babe",
                  boxShadow:"inset 0 2px 6px rgba(0,0,0,0.12)",
                  padding:6, display:"flex", flexWrap:"wrap", gap:4,
                  alignItems:"center", justifyContent:"center", minHeight:wide?44:60 }}>
                  {items.map(f=><span key={f.id} style={{fontSize:28}}>{f.emoji}</span>)}
                </div>
              );
            })}
          </div>
          {/* 영양 체크 */}
          <div style={{display:"flex",gap:10,fontSize:11,justifyContent:"center"}}>
            {["탄수","단백","채소"].map(c=>(
              <span key={c} style={{color:cats.has(c)?catColor[c]:C.dim}}>
                {cats.has(c)?"✅":"⬜"} {c}
              </span>
            ))}
            <span style={{color:C.dim}}>· 담은 음식 {tray.length}개</span>
          </div>

          <Btn full color={C.yellow} onClick={()=>tray.length>0&&setShown(true)} disabled={tray.length===0}>📊 탄소 분석</Btn>
        </> : <>
          {/* 결과 */}
          <div style={{padding:14,border:`1px solid ${score>=75?C.green:C.yellow}`,background:(score>=75?C.dimGreen:C.yellow)+"11"}}>
            <div style={{textAlign:"center"}}>
              <div style={{color:C.dim,fontSize:11}}>이 식판의 생산 탄소</div>
              <div style={{color:totalCO2<=10?C.green:totalCO2<=20?C.yellow:C.red,fontSize:40,fontWeight:900}}>
                {totalCO2.toFixed(1)}<span style={{fontSize:16}}>kg CO₂</span></div>
              <div style={{color:C.dim,fontSize:10}}>🚗 자동차 {km}km 주행 분량</div>
            </div>

            {/* 음식별 탄소 공개 */}
            <div style={{marginTop:12,display:"flex",flexDirection:"column",gap:4}}>
              {trayFoods.sort((a,b)=>b.co2-a.co2).map(f=>(
                <div key={f.id} style={{display:"flex",alignItems:"center",gap:8,fontSize:11}}>
                  <span style={{width:20}}>{f.emoji}</span>
                  <span style={{flex:1}}>{f.name} <span style={{color:C.dim,fontSize:9}}>({f.origin})</span></span>
                  <div style={{flex:2,height:8,background:C.border}}>
                    <div style={{height:"100%",background:f.co2>15?C.red:f.co2>5?C.yellow:C.green,width:`${Math.min(f.co2/27*100,100)}%`}} />
                  </div>
                  <span style={{width:48,textAlign:"right",color:f.co2>15?C.red:f.co2>5?C.yellow:C.green}}>{f.co2}kg</span>
                </div>
              ))}
            </div>
          </div>

          {/* 균형 / 코칭 */}
          {!balanced && (
            <div style={{padding:10,border:`1px solid ${C.red}`,background:C.red+"11",fontSize:11,color:C.red}}>
              ⚠ 영양 불균형! 탄수·단백·채소가 모두 있어야 한다. (현재 {[...cats].join(", ")||"없음"})
            </div>
          )}
          {balanced && proteinInTray && proteinInTray.co2>5 && (
            <div style={{padding:10,border:`1px solid ${C.green}55`,background:C.dimGreen+"11",fontSize:11,color:C.text,lineHeight:1.6}}>
              💡 <b>{proteinInTray.name}</b>({proteinInTray.co2}kg)을 <b>{lowProtein.name}</b>({lowProtein.co2}kg)로 바꾸면
              <span style={{color:C.green,fontWeight:700}}> 약 {(proteinInTray.co2-lowProtein.co2).toFixed(1)}kg</span> 줄어든다!
              <br/><span style={{color:C.dim,fontSize:10}}>소고기는 국산이어도 채소보다 수십 배 높다. 사육 과정에서 메탄이 나오기 때문.</span>
            </div>
          )}
          {balanced && totalCO2<=5 && (
            <div style={{padding:10,border:`1px solid ${C.green}`,background:C.dimGreen+"22",fontSize:12,color:C.green,fontWeight:700}}>
              🌍 완벽한 저탄소 식단! 지구가 고마워한다.
            </div>
          )}

          <div style={{textAlign:"center",color:C.yellow,fontWeight:900,fontSize:14}}>획득 점수: {score}점</div>
          <div style={{display:"flex",gap:8}}>
            <Btn full color={C.dim} onClick={()=>{setShown(false);}}>↩ 다시 담기</Btn>
            <Btn full color={C.green} onClick={()=>onClear(score)}>✅ 이 식단으로 확정</Btn>
          </div>
        </>}
      </div>
    </Panel>
  );
}

// 6. 다색 수집
function MultiColorMission({ target, onClear }) {
  const COLORS = ["빨강","주황","노랑","초록","흰색"];
  const videoRef = useRef(null), canvasRef = useRef(null);
  const [streaming, setStreaming] = useState(false);
  const [cur, setCur] = useState(null);
  const [found, setFound] = useState([]);
  const [msg, setMsg] = useState("");
  const startCam = async (color) => {
    setCur(color); setMsg("");
    try {
      const stream = await navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"}});
      videoRef.current.srcObject = stream; await videoRef.current.play(); setStreaming(true);
    } catch { alert("카메라 권한 필요"); }
  };
  const capture = () => {
    const {r,g,b}=captureColor(videoRef.current,canvasRef.current);
    videoRef.current?.srcObject?.getTracks().forEach(t=>t.stop()); setStreaming(false);
    const ok = COLOR_MATCHERS[cur]?.(r,g,b);
    if(ok){ const nf=[...found,cur]; setFound(nf); setMsg(`✅ ${cur} 인식 성공!`); if(nf.length>=target) onClear(100); }
    else setMsg(`❌ ${cur}색이 인식되지 않았다 (RGB ${r},${g},${b})`);
    setCur(null);
  };
  return (
    <Panel>
      <PanelHeader color={C.orange}>🌈 미션 — 무지개 식판 ({found.length}/{target})</PanelHeader>
      <div style={{padding:16,display:"flex",flexDirection:"column",gap:10}}>
        <video ref={videoRef} playsInline muted style={{width:"100%",border:`1px solid ${C.border}`,display:streaming?"block":"none"}} />
        <canvas ref={canvasRef} style={{display:"none"}} />
        {streaming && <Btn full color={C.yellow} onClick={capture}>📸 {cur} 촬영</Btn>}
        {msg && <div style={{fontSize:12,color:msg[0]==="✅"?C.green:C.red,textAlign:"center"}}>{msg}</div>}
        {COLORS.map(c=>(
          <div key={c} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 12px",
            border:`1px solid ${found.includes(c)?C.green:C.border}`,background:found.includes(c)?C.dimGreen+"33":C.bg}}>
            <span style={{fontSize:12,color:found.includes(c)?C.green:C.text}}>{found.includes(c)?"✅":"⬜"} {c} 식재료</span>
            {!found.includes(c) && !streaming && <Btn sm color={C.orange} onClick={()=>startCam(c)}>📷</Btn>}
          </div>
        ))}
      </div>
    </Panel>
  );
}

// 6.5 식물 일치율 (Claude 비전 판정)
function PlantMission({ target, refImage, onClear }) {
  const videoRef = useRef(null), canvasRef = useRef(null);
  const [streaming, setStreaming] = useState(false);
  const [photo, setPhoto] = useState(null); // base64
  const [loading, setLoading] = useState(false);
  const [result, setResult] = useState(null); // { match, ok, comment }
  useEffect(()=>()=>{ videoRef.current?.srcObject?.getTracks().forEach(t=>t.stop()); },[]);

  const startCam = async () => {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"}});
      videoRef.current.srcObject = stream; await videoRef.current.play();
      setStreaming(true); setResult(null); setPhoto(null);
    } catch { alert("카메라 권한이 필요합니다."); }
  };

  const capture = () => {
    const v=videoRef.current, cv=canvasRef.current;
    // 적당한 크기로 리사이즈 (긴 변 640)
    const scale = Math.min(640/(v.videoWidth||640), 1);
    cv.width=(v.videoWidth||640)*scale; cv.height=(v.videoHeight||480)*scale;
    cv.getContext("2d").drawImage(v,0,0,cv.width,cv.height);
    v.srcObject?.getTracks().forEach(t=>t.stop()); setStreaming(false);
    setPhoto(cv.toDataURL("image/jpeg",0.7));
  };

  const judge = async () => {
    if(!photo) return;
    setLoading(true); setResult(null);
    try {
      const photoB64 = photo.split(",")[1];
      const content = [
        { type:"text", text:`당신은 식물 판별 전문가입니다. 학생이 '${target}'(자생식물/들꽃)을 찾아 촬영했습니다. 아래 학생 사진이 '${target}'와 얼마나 일치하는지 판정하세요.${refImage?" 첫 번째 이미지는 정답 참고사진, 두 번째가 학생 사진입니다.":""}\n\n반드시 이 JSON 형식으로만 답하세요(다른 말 없이):\n{"match": 0~100 정수, "ok": true 또는 false(70 이상이면 true), "comment": "한 줄 평가(특징 언급)"}` },
      ];
      if(refImage){
        content.push({ type:"image", source:{ type:"base64", media_type:"image/jpeg", data: refImage.split(",")[1] } });
      }
      content.push({ type:"image", source:{ type:"base64", media_type:"image/jpeg", data: photoB64 } });

      const res = await fetch("https://api.anthropic.com/v1/messages",{
        method:"POST", headers:{"Content-Type":"application/json"},
        body:JSON.stringify({ model:"claude-sonnet-4-6", max_tokens:300, messages:[{ role:"user", content }] }),
      });
      const data = await res.json();
      let text = data.content?.map(b=>b.text||"").join("")||"";
      text = text.replace(/```json|```/g,"").trim();
      const parsed = JSON.parse(text);
      setResult(parsed);
      if(parsed.ok) onClear(Math.max(parsed.match||70, 70));
    } catch(e) {
      setResult({ match:0, ok:false, comment:"판정 오류. 사진을 다시 찍어 시도하라." });
    }
    setLoading(false);
  };

  return (
    <Panel>
      <PanelHeader color={C.green}>🌸 미션 — '{target}' 찾기 (일치율 70% 이상 통과)</PanelHeader>
      <div style={{padding:16,display:"flex",flexDirection:"column",gap:12}}>
        <div style={{fontSize:12,color:C.text,lineHeight:1.8}}>
          찾을 식물: <span style={{color:C.green,fontWeight:900,fontSize:15}}>{target}</span><br/>
          화단·텃밭을 살펴 <span style={{color:C.yellow}}>{target}</span>을(를) 찾아 가까이서 또렷하게 촬영하라.
        </div>
        {refImage && (
          <div>
            <div style={{fontSize:10,color:C.dim,marginBottom:4}}>📷 참고 사진 ({target})</div>
            <img src={refImage} alt="참고" style={{width:"100%",maxHeight:160,objectFit:"cover",border:`1px solid ${C.border}`}} />
          </div>
        )}
        <video ref={videoRef} playsInline muted style={{width:"100%",border:`1px solid ${C.border}`,display:streaming?"block":"none"}} />
        <canvas ref={canvasRef} style={{display:"none"}} />
        {photo && !streaming && (
          <div>
            <div style={{fontSize:10,color:C.dim,marginBottom:4}}>📸 내가 찍은 사진</div>
            <img src={photo} alt="촬영" style={{width:"100%",maxHeight:200,objectFit:"cover",border:`1px solid ${C.green}55`}} />
          </div>
        )}
        {!streaming && !photo && <Btn full color={C.green} onClick={startCam}>📷 카메라 켜기</Btn>}
        {streaming && <Btn full color={C.yellow} onClick={capture}>📸 촬영</Btn>}
        {photo && !result && <>
          <Btn full color={C.green} onClick={judge} disabled={loading}>{loading?"🌸 AI 판별 중...":"✓ 일치율 판정"}</Btn>
          <Btn full color={C.dim} sm onClick={startCam}>🔄 다시 찍기</Btn>
        </>}
        {result && (
          <div style={{padding:14,border:`1px solid ${result.ok?C.green:C.red}`,background:result.ok?C.dimGreen+"22":C.red+"11"}}>
            <div style={{textAlign:"center"}}>
              <div style={{color:C.dim,fontSize:11}}>일치율</div>
              <div style={{color:result.ok?C.green:C.red,fontSize:44,fontWeight:900}}>{result.match}%</div>
            </div>
            <div style={{color:C.text,fontSize:12,lineHeight:1.7,marginTop:6}}>🌸 {result.comment}</div>
            <div style={{color:result.ok?C.green:C.red,fontWeight:900,marginTop:8,textAlign:"center"}}>
              {result.ok?"✅ 미션 통과!":"❌ 70% 미만. 다시 찾아보라."}
            </div>
            {!result.ok && <div style={{marginTop:10}}><Btn full color={C.green} onClick={startCam}>🔄 재도전</Btn></div>}
          </div>
        )}
      </div>
    </Panel>
  );
}

// 7. 최종 설계 (AI 채점)
function FinalMission({ onClear, schoolName }) {
  const [input, setInput] = useState("");
  const [loading, setLoading] = useState(false);
  const [feedback, setFeedback] = useState("");
  const [passed, setPassed] = useState(false);
  const submit = async () => {
    if(input.trim().length<50){ alert("설계안을 더 구체적으로 작성하라 (최소 50자)"); return; }
    setLoading(true);
    try {
      const res = await fetch("https://api.anthropic.com/v1/messages",{
        method:"POST", headers:{"Content-Type":"application/json"},
        body:JSON.stringify({ model:"claude-sonnet-4-6", max_tokens:1000,
          messages:[{role:"user",content:`당신은 한국과학창의재단 STEAM 융합교육 심사위원입니다. ${schoolName} 학생팀이 '탄소중립 학교 설계안'을 제출했습니다:\n\n"${input}"\n\nSTEAM 5개 영역으로 채점하세요. 각 20점, 총 100점:\n- S(과학/에너지)\n- T(기술/식단·자원)\n- E(공학/실현가능성)\n- A(예술/캠페인)\n- M(수학/탄소수치)\n\n형식:\n각 영역 점수와 한 줄 평\n총점\n70점 이상이면 "판정: 합격", 미만이면 "판정: 재도전"\n마지막 줄: 합격 시 "🏆 2050 인증코드: GREENZERO-${Math.floor(Math.random()*90000)+10000}"\n\n한국어, 공식 심사 발표 말투로. 격려를 담되 후하지 않게.`}],
        }),
      });
      const data = await res.json();
      const text = data.content?.map(b=>b.text||"").join("")||"응답 오류";
      setFeedback(text);
      // 총점 추출 (없으면 70 기본)
      const m = text.match(/총점[^\d]*(\d{1,3})/);
      const finalScore = m ? Math.min(parseInt(m[1]),100) : 75;
      if((text.includes("합격") && !text.includes("재도전")) || text.includes("인증코드")){
        setPassed(true); onClear(finalScore*3); // 최종은 가중치 ×3
      }
    } catch { setFeedback("통신 오류. 다시 시도하라."); }
    setLoading(false);
  };
  return (
    <Panel color={C.yellow}>
      <PanelHeader color={C.yellow}>🏆 최종 미션 — 탄소중립 설계안 심사</PanelHeader>
      <div style={{padding:16,display:"flex",flexDirection:"column",gap:12}}>
        {!feedback ? <>
          <div style={{fontSize:11,color:C.dim,lineHeight:1.8}}>
            각 구역에서 배운 내용(에너지·탄소·캠페인·식단·인체발전·생태)을<br/>하나의 설계안으로 종합하라.
          </div>
          <textarea value={input} onChange={e=>setInput(e.target.value)}
            placeholder={"우리 학교 탄소중립 설계안:\n1. 에너지: 옥상 태양광으로 ...\n2. 탄소감축: 잔반 줄이기로 ...\n3. 캠페인: ...\n4. 식단: ...\n5. 인체발전: ...\n6. 텃밭: ..."}
            style={{width:"100%",minHeight:160,padding:12,background:C.bg,border:`1px solid ${C.yellow}55`,color:C.green,fontFamily:"monospace",fontSize:12,lineHeight:1.7,resize:"vertical",boxSizing:"border-box"}} />
          <Btn full color={C.yellow} onClick={submit} disabled={loading}>
            {loading?"▶ 2050 심사위원회 분석 중...":"▶ 설계안 제출"}</Btn>
        </> : <>
          <div style={{padding:14,border:`1px solid ${passed?C.green:C.red}`,background:passed?C.dimGreen+"22":C.red+"11",fontSize:12,lineHeight:1.9,whiteSpace:"pre-wrap"}}>
            {feedback}
          </div>
          {!passed && <Btn full color={C.yellow} onClick={()=>{setFeedback("");}}>↩ 보완해서 재제출</Btn>}
        </>}
      </div>
    </Panel>
  );
}

// 미션 화면 (스토리 + 센서 + 지도 버튼)
// ══════════════════════════════════════════════════════════
function MissionScreen({ room, completed, allDone, totalNonFinal, onComplete, onBack, schoolName }) {
  const done = completed.includes(room.id);
  const [cleared, setCleared] = useState(done);
  const [showPopup, setShowPopup] = useState(false);
  const [lastScore, setLastScore] = useState(100);
  const finalLocked = room.isFinal && !allDone;

  // 이번에 깬 직후 완료 개수 (final 제외)
  const clearedCountAfter = (()=>{
    const set = new Set(completed.filter(id=>id!=="final"));
    if(!room.isFinal) set.add(room.id);
    return set.size;
  })();

  const praiseFor = (n, total, isFinal) => {
    if(isFinal) return { title:"역사가 바뀌었다", msg:"네 설계가 2050년을 다시 썼다. 모든 미래의 너희가 너에게 빚졌다." };
    const ratio = n/total;
    if(n===1) return { title:"신호가 살아났다", msg:"첫 공해를 잡았다. 미래가 아주 작게 흔들렸어, 요원." };
    if(ratio<0.5) return { title:"회복 시작", msg:"지구가 너를 느끼기 시작했다. 다음 구역으로." };
    if(ratio<1)   return { title:"절반을 넘었다", msg:"멈출 수 없다. 남은 공해를 마저 해결하라." };
    return { title:"모든 공해 해결!", msg:"이제 마지막, 최종 설계만 남았다. 모두가 너를 본다." };
  };
  const praise = praiseFor(clearedCountAfter, totalNonFinal, room.isFinal);

  const handleClear = (score=100) => {
    if(!cleared){
      onComplete(room.id, score);
      setCleared(true);
      setShowPopup(true);
      setLastScore(score);
    }
  };

  const renderMission = () => {
    if(finalLocked) return (
      <Panel color={C.red}>
        <div style={{padding:20,textAlign:"center"}}>
          <div style={{fontSize:30}}>🔒</div>
          <div style={{color:C.red,fontWeight:900,marginTop:8}}>아직 잠겨있다</div>
          <div style={{color:C.dim,fontSize:11,marginTop:6,lineHeight:1.7}}>
            다른 모든 구역을 완료해야<br/>최종 설계를 제출할 수 있다.
          </div>
        </div>
      </Panel>
    );
    switch(room.sensor){
      case "decibel": return <DecibelMission target={room.target} onClear={handleClear} />;
      case "color": return (
        <Panel><PanelHeader color={room.color}>🎨 미션 — 색상 인식</PanelHeader>
          <div style={{padding:16}}><ColorCameraMission target={room.target} onClear={handleClear} accent={room.color} /></div>
        </Panel>);
      case "pitch": return <PitchMission target={room.target} onClear={handleClear} />;
      case "chord": return <ChordMission onClear={handleClear} />;
      case "shake": return <ShakeMission target={room.target} onClear={handleClear} />;
      case "beat": return <BeatMission target={room.target} onClear={handleClear} />;
      case "ratio": return <RatioMission onClear={handleClear} />;
      case "carbon": return <CarbonMission onClear={handleClear} />;
      case "multicolor": return <MultiColorMission target={room.target} onClear={handleClear} />;
      case "plant": return <PlantMission target={room.target} refImage={room.refImage} onClear={handleClear} />;
      case "final": return <FinalMission onClear={handleClear} schoolName={schoolName} />;
      default: return null;
    }
  };

  return (
    <div style={{...page,alignItems:"center",padding:"16px 16px 60px"}}>
      <Scanline />

      {/* 성공 팝업 */}
      {showPopup && (
        <div onClick={()=>setShowPopup(false)} style={{
          position:"fixed",inset:0,zIndex:10000,background:"rgba(0,0,0,0.85)",
          display:"flex",alignItems:"center",justifyContent:"center",padding:24}}>
          <div onClick={e=>e.stopPropagation()} style={{
            maxWidth:360,width:"100%",border:`2px solid ${C.green}`,background:C.panel,
            boxShadow:`0 0 40px ${C.green}66`,padding:0,overflow:"hidden",animation:"popIn 0.3s ease-out"}}>
            <div style={{color:C.bg,padding:"8px 0",textAlign:"center",fontWeight:900,letterSpacing:4,fontSize:13,
              background:`linear-gradient(90deg,${C.green},#9CFF2E,${C.green})`,backgroundSize:"200% 100%",animation:"shine 2s linear infinite"}}>
              {room.isFinal?"FINAL CLEAR":"MISSION COMPLETE"}
            </div>
            <div style={{padding:"24px 20px",textAlign:"center"}}>
              <div style={{fontSize:48}}>{room.isFinal?"🏆":"✅"}</div>
              {room.problem && !room.isFinal && (
                <div style={{marginTop:8,color:C.green,fontSize:12,letterSpacing:1}}>
                  {room.problemIcon} {room.problem} <span style={{color:C.dim}}>해결!</span>
                </div>
              )}
              <div style={{color:C.green,fontSize:20,fontWeight:900,marginTop:10,letterSpacing:1}}>{praise.title}</div>

              {/* 진행도 */}
              {!room.isFinal && <>
                <div style={{color:C.yellow,fontSize:13,fontWeight:900,marginTop:14,letterSpacing:1}}>
                  {clearedCountAfter} / {totalNonFinal} 구역 해결
                </div>
                <div style={{display:"flex",gap:4,justifyContent:"center",marginTop:8}}>
                  {Array.from({length:totalNonFinal}).map((_,i)=>(
                    <div key={i} style={{width:24,height:8,borderRadius:1,
                      background:i<clearedCountAfter?C.green:C.border}} />
                  ))}
                </div>
              </>}

              <div style={{color:C.text,fontSize:12,lineHeight:1.7,marginTop:16,fontStyle:"italic"}}>
                "{praise.msg}"
              </div>
              <div style={{color:C.yellow,fontSize:14,fontWeight:900,marginTop:14}}>
                +{lastScore} SCORE
              </div>

              <div style={{marginTop:20,display:"flex",flexDirection:"column",gap:8}}>
                <Btn full color={C.green} onClick={()=>{setShowPopup(false);onBack();}}>🗺 지도로 (다음 구역)</Btn>
                <Btn full color={C.dim} sm onClick={()=>setShowPopup(false)}>이 화면에 머무르기</Btn>
              </div>
            </div>
          </div>
        </div>
      )}

      <div style={{maxWidth:480,width:"100%",display:"flex",flexDirection:"column",gap:12}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <Btn sm onClick={onBack}>🗺 지도로</Btn>
          <span style={{padding:"4px 10px",fontSize:10,fontWeight:700,letterSpacing:1,
            background:cleared?C.green+"22":C.yellow+"22",border:`1px solid ${cleared?C.green:C.yellow}`,
            color:cleared?C.green:C.yellow}}>{cleared?"✅ CLEARED":"⚡ ACTIVE"}</span>
        </div>

        <Panel color={room.color+"66"}>
          <div style={{padding:"12px 16px"}}>
            <div style={{color:room.color,fontSize:10,letterSpacing:3}}>▶ ZONE [{room.steam}] · {FLOOR_LABELS[room.floor]}</div>
            <div style={{color:room.color,fontSize:22,fontWeight:900,marginTop:2}}>{room.emoji} {room.name}</div>
            {room.problem && <div style={{marginTop:6,display:"inline-block",padding:"3px 10px",border:`1px solid ${C.red}`,background:C.red+"22",color:C.red,fontSize:11,letterSpacing:1}}>
              {room.problemIcon} 해결 과제: {room.problem}</div>}
          </div>
        </Panel>

        {/* 문제 체감 */}
        {room.impact && (
          <Panel color={C.red+"44"}>
            <PanelHeader color={C.red}>⚠ 지금 이런 일이 벌어지고 있다</PanelHeader>
            <div style={{padding:14,fontSize:12,lineHeight:1.9,color:C.text}}>{room.impact}</div>
          </Panel>
        )}

        {/* 스토리 */}
        <StoryBox sender={room.sender} story={room.story} />

        {/* 미션 지시 */}
        <Panel color={C.green+"33"}>
          <PanelHeader color={C.green}>▶ 작전 지시</PanelHeader>
          <div style={{padding:14,fontSize:12,lineHeight:1.9,color:C.text}}>{room.missionText}</div>
        </Panel>

        {/* 실제 미션 or 완료 */}
        {cleared && !room.isFinal ? (
          <Panel color={C.green}>
            <div style={{padding:20,textAlign:"center"}}>
              <div style={{fontSize:34}}>✅</div>
              <div style={{color:C.green,fontSize:16,fontWeight:900,letterSpacing:2,marginTop:6}}>미션 완료!</div>
              <div style={{color:C.dim,fontSize:11,marginTop:4}}>+{lastScore}점 획득</div>
              <div style={{marginTop:16}}><Btn onClick={onBack} color={C.green}>🗺 지도로 돌아가기</Btn></div>
            </div>
          </Panel>
        ) : renderMission()}

        {/* 하단 지도 버튼 (항상) */}
        <Btn full color={C.dim} onClick={onBack}>🗺 지도로 이동</Btn>
      </div>
    </div>
  );
}

// ══════════════════════════════════════════════════════════
// 관리자 화면
// ══════════════════════════════════════════════════════════
function AdminScreen({ config, onSave, teams, onReset, onBack, leaderboard }) {
  const [pw, setPw] = useState(""); const [auth, setAuth] = useState(false);
  const [cfg, setCfg] = useState(config);
  const [dirty, setDirty] = useState(false);
  const [savedMsg, setSavedMsg] = useState("");
  // 편집 중(dirty)이 아닐 때만 외부 config 반영 (4초 폴링이 입력 덮어쓰지 않도록)
  useEffect(()=>{ if(!dirty) setCfg(config); },[config,dirty]);

  const doSave = async () => {
    try {
      await onSave(cfg);
      setDirty(false);
      setSavedMsg("✅ 저장 완료! 전체 학생에게 적용됨");
    } catch(e) {
      setSavedMsg("⚠ 저장 시도함 (미리보기에서는 반영 안 될 수 있음). 배포 후 정상 작동.");
    }
    setTimeout(()=>setSavedMsg(""), 4000);
  };

  if(!auth) return (
    <div style={{...page,alignItems:"center",justifyContent:"center",padding:24}}>
      <Scanline />
      <Panel color={C.yellow} style={{maxWidth:360,width:"100%"}}>
        <PanelHeader color={C.yellow}>▶ 교사 인증</PanelHeader>
        <div style={{padding:16,display:"flex",flexDirection:"column",gap:10}}>
          <input type="password" placeholder="비밀번호 (기본: greenzero)" value={pw}
            onChange={e=>setPw(e.target.value)} onKeyDown={e=>e.key==="Enter"&&(pw===ADMIN_PW?setAuth(true):alert("틀렸습니다"))}
            style={{padding:"11px",background:"transparent",border:`1px solid ${C.yellow}55`,color:C.yellow,fontFamily:"monospace",fontSize:14,outline:"none"}} />
          <Btn full color={C.yellow} onClick={()=>pw===ADMIN_PW?setAuth(true):alert("틀렸습니다")}>▶ 인증</Btn>
          <Btn full color={C.dim} onClick={onBack}>← 뒤로</Btn>
        </div>
      </Panel>
    </div>
  );

  const updateRoom = (idx, key, val) => {
    const rooms=[...cfg.rooms]; rooms[idx]={...rooms[idx],[key]:val}; setCfg({...cfg,rooms}); setDirty(true);
  };

  return (
    <div style={{...page,alignItems:"center",padding:24}}>
      <Scanline />
      <div style={{maxWidth:560,width:"100%",display:"flex",flexDirection:"column",gap:12}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div style={{color:C.yellow,fontSize:18,fontWeight:900,letterSpacing:2}}>⚙ 교사 관리자</div>
          <Btn sm color={C.dim} onClick={onBack}>← 나가기</Btn>
        </div>

        <Panel color={C.yellow}>
          <PanelHeader color={C.yellow}>▶ 게임 운영</PanelHeader>
          <div style={{padding:14,display:"flex",flexDirection:"column",gap:12}}>
            <div>
              <div style={{fontSize:11,color:C.dim,marginBottom:6}}>학교명</div>
              <input value={cfg.schoolName} onChange={e=>{setCfg({...cfg,schoolName:e.target.value});setDirty(true);}}
                style={{width:"100%",padding:"9px",background:C.bg,border:`1px solid ${C.border}`,color:C.green,fontFamily:"monospace",fontSize:13,boxSizing:"border-box"}} />
            </div>
            <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
              <Btn color={cfg.gameActive?C.green:C.dim} onClick={()=>{setCfg({...cfg,gameActive:!cfg.gameActive});setDirty(true);}}>
                {cfg.gameActive?"🟢 게임 진행중":"⬛ 게임 대기"} (전환)</Btn>
              <Btn color={C.red} onClick={()=>{if(confirm("전체 팀 진행상황을 초기화합니까?"))onReset();}}>🗑 팀 초기화</Btn>
            </div>
          </div>
        </Panel>

        <Panel>
          <PanelHeader>▶ 구역별 미션 설정 ({cfg.rooms.length}개)</PanelHeader>
          <div style={{padding:14,display:"flex",flexDirection:"column",gap:16}}>
            {cfg.rooms.map((room,idx)=>(
              <div key={room.id} style={{border:`1px solid ${room.color}44`,padding:12}}>
                <div style={{color:room.color,fontSize:13,fontWeight:700,marginBottom:8}}>{room.emoji} {room.name} <span style={{color:C.dim,fontSize:10}}>[{room.steam}]</span></div>
                <div style={{display:"flex",flexDirection:"column",gap:8}}>
                  <div style={{display:"flex",gap:8}}>
                    <input value={room.name} onChange={e=>updateRoom(idx,"name",e.target.value)} placeholder="구역명"
                      style={{flex:2,padding:"6px",background:C.bg,border:`1px solid ${C.border}`,color:C.text,fontFamily:"monospace",fontSize:11}} />
                    <select value={room.floor} onChange={e=>updateRoom(idx,"floor",+e.target.value)}
                      style={{flex:1,padding:"6px",background:C.bg,border:`1px solid ${C.border}`,color:C.text,fontFamily:"monospace",fontSize:11}}>
                      {[4,3,2,1,0].map(f=><option key={f} value={f}>{FLOOR_LABELS[f]}</option>)}
                    </select>
                  </div>
                  <select value={room.sensor} onChange={e=>updateRoom(idx,"sensor",e.target.value)}
                    style={{padding:"6px",background:C.bg,border:`1px solid ${C.border}`,color:C.text,fontFamily:"monospace",fontSize:11}}>
                    {Object.entries(SENSOR_TYPES).map(([k,v])=><option key={k} value={k}>{v.label}</option>)}
                  </select>
                  {/* 미션 목표값 */}
                  {room.sensor==="decibel" && (
                    <label style={{fontSize:11,color:C.dim}}>목표 데시벨: {room.target}
                      <input type="range" min={30} max={90} value={room.target} onChange={e=>updateRoom(idx,"target",+e.target.value)} style={{width:"100%"}} /></label>)}
                  {room.sensor==="shake" && (
                    <label style={{fontSize:11,color:C.dim}}>목표 점프 횟수: {room.target}
                      <input type="range" min={5} max={50} value={room.target} onChange={e=>updateRoom(idx,"target",+e.target.value)} style={{width:"100%"}} /></label>)}
                  {room.sensor==="beat" && (
                    <label style={{fontSize:11,color:C.dim}}>박자 BPM: {room.target} (애국가≈84)
                      <input type="range" min={60} max={140} value={room.target} onChange={e=>updateRoom(idx,"target",+e.target.value)} style={{width:"100%"}} /></label>)}
                  {(room.sensor==="color") && (
                    <select value={room.target} onChange={e=>updateRoom(idx,"target",e.target.value)}
                      style={{padding:"6px",background:C.bg,border:`1px solid ${C.border}`,color:C.text,fontFamily:"monospace",fontSize:11}}>
                      {Object.keys(COLOR_MATCHERS).map(c=><option key={c} value={c}>목표색: {c}</option>)}
                    </select>)}
                  {room.sensor==="pitch" && (
                    <select value={room.target} onChange={e=>updateRoom(idx,"target",e.target.value)}
                      style={{padding:"6px",background:C.bg,border:`1px solid ${C.border}`,color:C.text,fontFamily:"monospace",fontSize:11}}>
                      {NOTES.map(n=><option key={n} value={n}>목표음: {n}</option>)}
                    </select>)}
                  {room.sensor==="multicolor" && (
                    <label style={{fontSize:11,color:C.dim}}>목표 색 개수: {room.target}
                      <input type="range" min={3} max={6} value={room.target} onChange={e=>updateRoom(idx,"target",+e.target.value)} style={{width:"100%"}} /></label>)}
                  {room.sensor==="plant" && (
                    <div style={{display:"flex",flexDirection:"column",gap:8}}>
                      <input value={room.target} onChange={e=>updateRoom(idx,"target",e.target.value)} placeholder="찾을 식물 이름 (예: 꿀풀)"
                        style={{padding:"7px",background:C.bg,border:`1px solid ${C.border}`,color:C.green,fontFamily:"monospace",fontSize:12}} />
                      <label style={{fontSize:11,color:C.dim,cursor:"pointer"}}>
                        📷 참고 사진 업로드 (선택)
                        <input type="file" accept="image/*" style={{display:"none"}}
                          onChange={e=>{
                            const file=e.target.files?.[0]; if(!file) return;
                            const img=new Image(); const reader=new FileReader();
                            reader.onload=()=>{ img.onload=()=>{
                              const cv=document.createElement("canvas");
                              const scale=Math.min(480/img.width,1);
                              cv.width=img.width*scale; cv.height=img.height*scale;
                              cv.getContext("2d").drawImage(img,0,0,cv.width,cv.height);
                              updateRoom(idx,"refImage",cv.toDataURL("image/jpeg",0.6));
                            }; img.src=reader.result; };
                            reader.readAsDataURL(file);
                          }} />
                      </label>
                      {room.refImage && <img src={room.refImage} alt="참고" style={{width:"100%",maxHeight:120,objectFit:"cover",border:`1px solid ${C.green}55`}} />}
                    </div>)}
                  <textarea value={room.story} onChange={e=>updateRoom(idx,"story",e.target.value)} placeholder="2050 스토리"
                    style={{padding:"6px",background:C.bg,border:`1px solid ${C.border}`,color:C.text,fontFamily:"monospace",fontSize:11,minHeight:60,resize:"vertical"}} />
                </div>
              </div>
            ))}
          </div>
        </Panel>

        <Btn full color={C.yellow} onClick={doSave}>💾 설정 저장 (전체 학생에게 적용)</Btn>
        {savedMsg && <div style={{padding:"10px 14px",border:`1px solid ${C.green}`,background:C.dimGreen+"22",color:C.green,fontSize:12,textAlign:"center"}}>{savedMsg}</div>}
        {dirty && !savedMsg && <div style={{color:C.yellow,fontSize:11,textAlign:"center"}}>● 저장되지 않은 변경사항이 있습니다</div>}

        <Panel>
          <PanelHeader>▶ 팀 현황 ({Object.keys(teams).length}팀)</PanelHeader>
          {leaderboard.length===0 ? <div style={{padding:20,textAlign:"center",color:C.dim,fontSize:12}}>참가 팀 없음</div>
            : leaderboard.map((t,i)=>(
            <div key={t.name} style={{display:"flex",justifyContent:"space-between",padding:"8px 14px",fontSize:11,borderBottom:`1px solid ${C.border}22`}}>
              <span>{i+1}. {t.name}</span><span style={{color:C.dim}}>{t.completed}완료</span><span style={{color:C.yellow}}>⭐{t.score}</span>
            </div>))}
        </Panel>

        <div style={{color:C.dim,fontSize:10,lineHeight:1.8,padding:8}}>
          💡 배포 팁: 각 구역에 실물 재료(셀로판지, 식물 팻말, 황금비율 구조물 등)를 미리 배치하고,
          교실 입구에 이 앱 링크 QR을 붙이면 학생들이 직접 찾아다니며 미션을 수행한다.
        </div>
      </div>
    </div>
  );
}

// ══════════════════════════════════════════════════════════
// 메인 앱
// ══════════════════════════════════════════════════════════
function SteamMission() {
  const [screen, setScreen] = useState("boot");
  const [bootStep, setBootStep] = useState(0);
  const [teamName, setTeamName] = useState("");
  const [inputName, setInputName] = useState("");
  const [teams, setTeams] = useState({});
  const [config, setConfig] = useState(DEFAULT_CONFIG);
  const [room, setRoom] = useState(null);

  const today = new Date().toLocaleDateString("ko-KR");
  const bootLines = [
    "> 알 수 없는 신호 수신 중...",
    "> 발신지 추적... ████████",
    "> 발신: 2050.03.14 04:17 KST",
    "> 수신: " + today,
    "> 경고: 탄소 임계점까지 D-547",
    "> 암호 해제... ██████ 완료",
    "> 긴급 작전 파일 복원됨",
    "> 작전명: GREEN ZERO",
    "> 요원 인증 대기중...",
  ];

  useEffect(()=>{
    if(screen!=="boot") return;
    if(bootStep<bootLines.length){ const t=setTimeout(()=>setBootStep(s=>s+1),360); return ()=>clearTimeout(t); }
    const t=setTimeout(()=>setScreen("briefing"),500); return ()=>clearTimeout(t);
  },[bootStep,screen]);

  const loadData = useCallback(async ()=>{
    try {
      const t=await window.storage.get(TEAMS_KEY,SHARED); if(t) setTeams(JSON.parse(t.value));
      const c=await window.storage.get(CONFIG_KEY,SHARED); if(c) setConfig(JSON.parse(c.value));
    } catch {}
  },[]);
  useEffect(()=>{ loadData(); const iv=setInterval(loadData,4000); return ()=>clearInterval(iv); },[loadData]);

  const saveTeams = async (d)=>{ await window.storage.set(TEAMS_KEY,JSON.stringify(d),SHARED); setTeams(d); };
  const saveConfig = async (d)=>{ await window.storage.set(CONFIG_KEY,JSON.stringify(d),SHARED); setConfig(d); };

  const myTeam = teams[teamName] || { completed:[], score:0 };
  const myCompleted = myTeam.completed || [];
  const rooms = config.rooms || DEFAULT_CONFIG.rooms;
  const nonFinalRooms = rooms.filter(r=>!r.isFinal);
  const allNonFinalDone = nonFinalRooms.every(r=>myCompleted.includes(r.id));

  const completeRoom = async (roomId, score=100)=>{
    if(myCompleted.includes(roomId)) return;
    const newScores = {...(myTeam.scores||{}), [roomId]: score};
    const totalScore = Object.values(newScores).reduce((a,b)=>a+b,0);
    await saveTeams({...teams,[teamName]:{...myTeam,completed:[...myCompleted,roomId],scores:newScores,score:totalScore}});
  };
  const joinGame = ()=>{
    if(!inputName.trim()) return;
    const n=inputName.trim(); setTeamName(n);
    if(!teams[n]) saveTeams({...teams,[n]:{completed:[],score:0}});
    setScreen("map");
  };

  const leaderboard = Object.entries(teams)
    .map(([name,d])=>({name,score:d.score||0,completed:d.completed?.length||0}))
    .sort((a,b)=>b.score-a.score);

  const floors = [...new Set(rooms.map(r=>r.floor))].sort((a,b)=>b-a);

  // ── 부팅
  if(screen==="boot") return (
    <div style={{...page,justifyContent:"center",alignItems:"center"}}>
      <Scanline />
      <div style={{maxWidth:480,width:"100%",padding:32}}>
        <div style={{color:C.green,fontSize:11,lineHeight:2.4}}>
          {bootLines.slice(0,bootStep).map((l,i)=><div key={i} style={{opacity:i===bootStep-1?1:0.5}}>{l}</div>)}
          {bootStep<bootLines.length && <span>█</span>}
        </div>
      </div>
    </div>
  );

  // ── 브리핑
  if(screen==="briefing") return (
    <div style={{...page,alignItems:"center",padding:24}}>
      <Scanline />
      <div style={{maxWidth:480,width:"100%",display:"flex",flexDirection:"column",gap:14}}>
        <Panel color={C.red}>
          <div style={{padding:"14px 16px"}}>
            <div style={{color:C.red,fontSize:10,letterSpacing:3,marginBottom:6}}>⚠ 긴급 수신 — 발신: 2050.03.14</div>
            <div style={{color:"#fff",fontSize:24,fontWeight:900,letterSpacing:2}}>작전명: GREEN ZERO</div>
            <div style={{color:C.yellow,fontSize:11,marginTop:6}}>📡 신호 ████████░░ 83% · 역방향 시간 통신</div>
          </div>
        </Panel>
        <StoryBox sender="2050년의 생존자들" story={config.story?.intro||DEFAULT_CONFIG.story.intro} signoff={config.story?.signoff} />
        <Panel color={C.green+"33"}>
          <PanelHeader color={C.green}>▶ 작전 지시</PanelHeader>
          <div style={{padding:14,fontSize:12,lineHeight:2,color:C.text}}>
            학교 각 구역을 직접 찾아가 미션을 수행하라.<br/>
            모든 구역 완료 후 설계안을 제출하면<br/>
            <span style={{color:C.green,fontWeight:900}}>과거가 바뀐다.</span>
          </div>
        </Panel>
        {!config.gameActive && (
          <Panel color={C.red}><div style={{padding:14,color:C.red,fontSize:12,textAlign:"center"}}>⏸ 게임이 아직 시작되지 않았다. 교사를 기다려라.</div></Panel>
        )}
        <Panel color={C.green+"44"}>
          <PanelHeader color={C.green}>▶ 요원 팀명 입력 · {config.schoolName}</PanelHeader>
          <div style={{padding:14,display:"flex",flexDirection:"column",gap:10}}>
            <input placeholder="팀명을 입력하라_" value={inputName} onChange={e=>setInputName(e.target.value)}
              onKeyDown={e=>e.key==="Enter"&&config.gameActive&&joinGame()}
              style={{padding:"11px",background:"transparent",border:`1px solid ${C.green}55`,color:C.green,fontFamily:"monospace",fontSize:14,outline:"none",letterSpacing:2}} />
            <Btn full onClick={joinGame} disabled={!config.gameActive}>▶ 작전 개시</Btn>
          </div>
        </Panel>
        <div style={{display:"flex",gap:8}}>
          <Btn full color={C.dim} onClick={()=>{loadData();setScreen("leaderboard");}}>📊 현황</Btn>
          <Btn full color={C.dim} onClick={()=>setScreen("admin")}>⚙ 교사용</Btn>
        </div>
      </div>
    </div>
  );

  // ── 관리자
  if(screen==="admin") return <AdminScreen config={config} onSave={saveConfig} teams={teams}
    onReset={()=>saveTeams({})} onBack={()=>setScreen("briefing")} leaderboard={leaderboard} />;

  // ── 지도
  if(screen==="map") return (
    <div style={{...page,alignItems:"center",padding:"16px 16px 40px"}}>
      <Scanline />
      <div style={{maxWidth:520,width:"100%",display:"flex",flexDirection:"column",gap:10}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div>
            <div style={{color:C.green,fontSize:11,letterSpacing:2}}>▶ {teamName}</div>
            <div style={{color:C.yellow,fontSize:12,marginTop:2}}>⭐ {myTeam.score} · {myCompleted.length}/{rooms.length} 완료</div>
          </div>
          <div style={{display:"flex",gap:6}}>
            <Btn sm onClick={()=>{loadData();setScreen("leaderboard");}}>순위</Btn>
            <Btn sm onClick={()=>setScreen("briefing")}>← 나가기</Btn>
          </div>
        </div>
        <Panel color={C.green+"44"}>
          <div style={{padding:"10px 14px"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline"}}>
              <span style={{color:C.green,fontSize:11,letterSpacing:1}}>🌍 기후위기 회복도</span>
              <span style={{color:C.yellow,fontSize:13,fontWeight:900}}>{Math.round(myCompleted.filter(id=>id!=="final").length/Math.max(nonFinalRooms.length,1)*100)}%</span>
            </div>
            <div style={{background:C.border,height:10,marginTop:6,borderRadius:2,overflow:"hidden"}}>
              <div style={{height:"100%",background:`linear-gradient(90deg,${C.red},${C.yellow},${C.green})`,
                width:`${myCompleted.filter(id=>id!=="final").length/Math.max(nonFinalRooms.length,1)*100}%`,transition:"width 0.6s"}} />
            </div>
            <div style={{color:C.dim,fontSize:9,marginTop:4,letterSpacing:1}}>
              공해를 하나씩 해결할수록 지구가 회복된다 · {myCompleted.filter(id=>id!=="final").length}/{nonFinalRooms.length} 해결
            </div>
          </div>
        </Panel>

        <Panel>
          <PanelHeader>▶ {config.schoolName} — 구역을 직접 찾아가라</PanelHeader>
          <div style={{position:"relative",overflow:"hidden"}}>
            <div style={{position:"absolute",left:0,right:0,height:60,zIndex:1,pointerEvents:"none",
              background:`linear-gradient(180deg,transparent,${C.green}22,transparent)`,
              animation:"radarSweep 4s linear infinite"}} />
          {floors.map(floor=>{
            const fr=rooms.filter(r=>r.floor===floor);
            return (
              <div key={floor} style={{borderBottom:`1px solid ${C.border}`,display:"flex",minHeight:80}}>
                <div style={{width:44,flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",borderRight:`1px solid ${C.border}`,color:C.dim,fontSize:10,writingMode:"vertical-rl",letterSpacing:1}}>
                  {FLOOR_LABELS[floor]}
                </div>
                <div style={{flex:1,display:"flex",flexWrap:"wrap",padding:8,gap:6}}>
                  {fr.map(r=>{
                    const done=myCompleted.includes(r.id);
                    const locked=r.isFinal && !allNonFinalDone;
                    return (
                      <button key={r.id} onClick={()=>{setRoom(r);setScreen("mission");}}
                        style={{position:"relative",zIndex:2,flex:r.isFinal?"1 1 100%":"1 1 calc(50% - 6px)",padding:"10px 8px",
                          background:done?C.dimGreen+"66":locked?"#0a0a0a":C.bg,
                          border:`2px solid ${done?C.green:locked?C.dim:r.color+"55"}`,
                          color:done?C.green:locked?C.dim:r.color,fontFamily:"monospace",cursor:"pointer",textAlign:"left",
                          boxShadow:done?`0 0 12px ${C.green}66`:"none",transition:"all 0.2s"}}>
                        <div style={{position:"absolute",top:8,right:8,width:8,height:8,borderRadius:"50%",
                          background:done?C.green:locked?C.dim:r.color,
                          animation:done||locked?"none":"blink 1.4s infinite",
                          boxShadow:done?`0 0 8px ${C.green}`:"none"}} />
                        <div style={{fontSize:20}}>{done?"✅":locked?"🔒":r.emoji}</div>
                        <div style={{fontSize:11,marginTop:4,letterSpacing:1}}>{r.name}</div>
                        {r.problem && <div style={{fontSize:9,marginTop:3,color:done?C.green:r.color,opacity:0.9}}>
                          {done?"✔ 해결됨":`${r.problemIcon} ${r.problem}`}</div>}
                        <div style={{fontSize:8,opacity:0.5,marginTop:2}}>[{r.steam}] {SENSOR_TYPES[r.sensor]?.label.split(" ")[0]}</div>
                        {done && <div style={{fontSize:9,color:C.green,marginTop:2}}>◼ CLEARED</div>}
                      </button>
                    );
                  })}
                </div>
              </div>
            );
          })}
          </div>
        </Panel>

        <Panel>
          <PanelHeader>▶ 실시간 현황</PanelHeader>
          {leaderboard.slice(0,5).map((t,i)=>(
            <div key={t.name} style={{display:"flex",justifyContent:"space-between",padding:"7px 14px",fontSize:11,
              borderBottom:`1px solid ${C.border}22`,color:t.name===teamName?C.green:C.dim,
              fontWeight:t.name===teamName?700:400,background:t.name===teamName?C.dimGreen+"22":"transparent"}}>
              <span>{i+1}. {t.name} {t.name===teamName?"◀":""}</span>
              <span>{t.completed}/{rooms.length}</span><span style={{color:C.yellow}}>⭐{t.score}</span>
            </div>
          ))}
        </Panel>
      </div>
    </div>
  );

  // ── 미션
  if(screen==="mission" && room) return (
    <MissionScreen room={room} completed={myCompleted} allDone={allNonFinalDone}
      totalNonFinal={nonFinalRooms.length}
      onComplete={completeRoom} onBack={()=>setScreen("map")} schoolName={config.schoolName} />
  );

  // ── 리더보드
  if(screen==="leaderboard"){
    const myRank = leaderboard.findIndex(t=>t.name===teamName)+1;
    const maxScore = nonFinalRooms.length*100 + 300; // 대략 만점 (final ×3 = 최대 300)
    const myPct = myTeam.score ? Math.min(Math.round(myTeam.score/maxScore*100),100) : 0;
    const tr = tempReduction(myPct);
    return (
    <div style={{...page,alignItems:"center",padding:24}}>
      <Scanline />
      <div style={{maxWidth:480,width:"100%",display:"flex",flexDirection:"column",gap:10}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div style={{color:C.green,fontSize:20,fontWeight:900,letterSpacing:2}}>🏆 작전 랭킹</div>
          <Btn sm onClick={()=>setScreen(teamName?"map":"briefing")}>← 뒤로</Btn>
        </div>

        {/* 내 결과 히어로 카드 */}
        {teamName && myRank>0 && (
          <Panel color={tr.color} style={{boxShadow:`0 0 24px ${tr.color}44`}}>
            <div style={{padding:"16px",textAlign:"center"}}>
              <div style={{color:C.dim,fontSize:11,letterSpacing:2}}>{teamName} 의 작전 결과</div>
              <div style={{display:"flex",justifyContent:"center",gap:24,marginTop:10,alignItems:"flex-end"}}>
                <div>
                  <div style={{color:C.yellow,fontSize:36,fontWeight:900,lineHeight:1}}>{myRank}<span style={{fontSize:16}}>위</span></div>
                  <div style={{color:C.dim,fontSize:10,marginTop:2}}>전체 {leaderboard.length}팀 중</div>
                </div>
                <div style={{borderLeft:`1px solid ${C.border}`,paddingLeft:24}}>
                  <div style={{color:tr.color,fontSize:36,fontWeight:900,lineHeight:1}}>-{tr.temp}℃</div>
                  <div style={{color:C.dim,fontSize:10,marginTop:2}}>지구온도 감축</div>
                </div>
              </div>
              <div style={{marginTop:12,padding:"6px 10px",background:tr.color+"22",border:`1px solid ${tr.color}`,color:tr.color,fontSize:12,fontWeight:700}}>
                {tr.label}
              </div>
              <div style={{color:C.text,fontSize:11,marginTop:8,lineHeight:1.6}}>{tr.desc}</div>
              <div style={{color:C.dim,fontSize:10,marginTop:6}}>회복도 {myPct}% · 누적 {myTeam.score}점</div>
            </div>
          </Panel>
        )}

        <div style={{color:C.dim,fontSize:10,letterSpacing:1}}>4초마다 갱신 · {Object.keys(teams).length}팀 · {config.schoolName}</div>
        {leaderboard.length===0 ? <div style={{color:C.dim,textAlign:"center",padding:40,fontSize:12}}>참가 팀 없음</div>
          : leaderboard.map((t,i)=>{
          const pct = t.score ? Math.min(Math.round(t.score/maxScore*100),100) : 0;
          const ttr = tempReduction(pct);
          return (
          <div key={t.name} style={{display:"flex",alignItems:"center",gap:10,padding:"12px 14px",
            border:`1px solid ${t.name===teamName?C.green:C.border}`,background:t.name===teamName?C.dimGreen+"33":C.panel}}>
            <span style={{fontSize:18,width:28}}>{["🥇","🥈","🥉"][i]||`${i+1}`}</span>
            <span style={{flex:1,color:t.name===teamName?C.green:C.text,fontSize:13}}>{t.name} {t.name===teamName?"◀":""}</span>
            <span style={{color:ttr.color,fontSize:11,fontWeight:700}}>-{ttr.temp}℃</span>
            <span style={{color:C.dim,fontSize:10}}>{t.completed}/{rooms.length}</span>
            <span style={{color:C.yellow,fontSize:13,fontWeight:700}}>⭐{t.score}</span>
          </div>);})}
        <Btn full color={C.dim} onClick={loadData}>🔄 새로고침</Btn>
      </div>
    </div>
  );
  }

  return null;
}

// 렌더 (storage shim 준비될 때까지 대기)
function boot(){
  if(!window.__storageReady){ setTimeout(boot, 50); return; }
  document.getElementById("loading").style.display = "none";
  const root = ReactDOM.createRoot(document.getElementById("root"));
  root.render(<SteamMission />);
}
boot();
</script>
</body>
</html>
